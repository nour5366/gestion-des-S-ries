<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" type="text/css"href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
    <meta charset="utf-8">
    <title>Liste des Séries</title>
</head>

<body>
<div class="container mt-5">
<div class="card">
 <div class="card-header">
                Liste des Séries
            </div>
            <div class="card-body">
                <table class="table table-striped">

                        <tr>
                            <th>Code</th>
                            <th>Titre Série</th>
                            <th>Nombre Épisodes</th>
                            <th>Action</th>
                        </tr>ium
                  
                    <tbody>
                        <tr th:each="s:${series.content}">
                            <td th:text="${s.codeSerie}"></td>
                            <td th:text="${s.titreSerie}"></td>
                            <td th:text="${s.nombreEpisodes}"></td>
                            <td>
                                <a class="btn btn-danger" onclick="return confirm('Etes-vous sûr ?')"
                                    th:href="@{supprimerSerie(id=${s.codeSerie}, page=${currentPage}, size=${size})}">
                                    Supprimer
                                </a>
                            </td>
                            
                        </tr>
                    </tbody>
                </table>
                <ul class="nav nav-pills">
                    <li th:each="pa,status:${pages}">
                        <a th:class="${status.index==currentPage?'btn btn-primary ml-1':'btn btn-outline-primary ml-1'}"
                            th:href="@{ListeSeries(page=${status.index}, size=${size})}" th:text="${status.index}"></a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>

</html>
